# LocalFit AI 설정 파일 템플릿
# 이 파일을 config.yaml로 복사하여 사용하세요.
# config.yaml은 .gitignore에 포함되어 있습니다.

llm:
  host: "http://127.0.0.1:11434"   # Ollama 서버 주소 (ADR-002: 로컬만 허용)
  model: "qwen3:8b"                 # 단일 코칭 모델 (ADR-004)
  timeout_sec: 8.0                  # LLM 응답 타임아웃
  keep_alive: "24h"                 # 모델 unload 방지

stt:
  model: "large-v3-turbo"           # faster-whisper 모델 (ADR-005)
  device: "cuda"                    # cuda / cpu
  compute_type: "float16"           # float16 / int8
  language: "ko"                    # 한국어 고정
  timeout_sec: 30.0                 # 전사 최대 허용 시간(초)
  beam_size: 1                      # 지연 우선 (5는 정확도 우선) — ADR-005
  vad_filter: true                  # Whisper 자체 VAD (silero VAD와 이중 적용)
  resample_to: 16000                # ADR-005 §결정: 입력 != 16k면 강제 리샘플

tts:
  active: "qwen3"                   # ADR-006: faster-qwen3-tts 단독 (MeloTTS 제거 2026-06-08)
  qwen3:
    model_id: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
    ref_audio_path: "data/ref_voice.wav"   # 참조 음성 (6초 이상 한국어 WAV) — voice clone
    ref_text: ""                    # 참조 음성 전사 텍스트 (정확도 향상용)
    attn_implementation: "sdpa"     # sdpa 우선 시도, 미지원 시 자동 eager 폴백 (ADR-006)
    device: "cuda:0"                # faster-qwen3-tts 디바이스
    language: "Korean"              # faster-qwen3-tts 언어 코드
    timeout_sec: "30.0"
    # 음색 일관성 (ADR-006): 기본값(temp 0.9/top_k 50)은 짧은 큐에서 음색이 흔들림 → 낮춰 고정
    temperature: "0.7"
    top_k: "40"
    top_p: "0.95"
    repetition_penalty: "1.05"
    do_sample: "true"               # "false"면 그리디(가장 일관, 다소 단조로울 수 있음)
    xvec_only: "false"              # "true"면 x-vector 화자 임베딩 클로닝(음색 일관성↑, 충실도↓). 발화마다 목소리 달라지면 "true"

vad:
  model: "silero_vad"               # silero-vad via pipecat-ai[silero] (ADR-007)
  threshold: 0.5                    # 음성 감지 임계값 (Pipecat confidence)
  min_silence_ms: 400               # 발화 종료 판정 최소 침묵 구간(ms) — ADR-007 §결정
  sample_rate: 16000                # silero VAD는 8k/16k만 지원
  use_smart_turn: false             # ADR-007: P1 검증 후 true 전환

db:
  path: "data/localfit.db"          # SQLite 파일 경로 (ADR-008)

counting:
  beat_interval_sec: 2.0            # 운동 박자 간격(초)
  max_reps: 200                     # 단일 세트 최대 반복 횟수 (안전 한도)

coach:
  proactive_opener: true            # 능동 코치 첫 발화 자동 시작 (ADR-013 §0)
  context_recent_sessions: 5        # 최근 N회 세션을 컨텍스트에 포함 (ADR-013)
  response_length:                  # 시스템 프롬프트 가이드 + Pydantic max_length=500 안전망
    proactive_opener_max: 70
    proactive_proposal_max: 120
    reactive_max: 500
    safety_max: 150
  instructor:
    max_retries: 2                  # instructor JSON 재시도 횟수 (ADR-013)
    mode: "json"                    # instructor.Mode.JSON (Ollama OpenAI-compat)
